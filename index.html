<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto Web - Manual PDF</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .container{
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:60px;
      border-radius:25px;
      backdrop-filter:blur(10px);
      box-shadow:0 0 40px rgba(0,0,0,0.5);
      width:90%;
      max-width:700px;
      animation:fadeIn 1.2s ease;
    }

    h1{
      font-size:3rem;
      margin-bottom:20px;
      color:#38bdf8;
    }

    p{
      font-size:1.2rem;
      margin-bottom:40px;
      color:#cbd5e1;
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      padding:18px 40px;
      background:linear-gradient(135deg,#06b6d4,#3b82f6);
      color:white;
      text-decoration:none;
      font-size:1.2rem;
      border-radius:15px;
      transition:0.3s;
      box-shadow:0 0 20px rgba(59,130,246,0.5);
    }

    .btn:hover{
      transform:scale(1.08);
      box-shadow:0 0 30px rgba(6,182,212,0.8);
    }

    .icon{
      font-size:80px;
      margin-bottom:20px;
    }

    footer{
      margin-top:40px;
      color:#94a3b8;
      font-size:0.9rem;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="icon">📘</div>

    <h1>Manual del Proyecto</h1>

    <p>
      Descarga el manual completo en PDF donde se explica
      paso a paso cómo se realizó el despliegue del proyecto
      utilizando GitHub y Render.
    </p>

    <a class="btn" href="manual.pdf" download>
      ⬇ Descargar Manual PDF
    </a>

    <footer>
      Proyecto Web © 2026
    </footer>

  </div>

</body>
</html>
